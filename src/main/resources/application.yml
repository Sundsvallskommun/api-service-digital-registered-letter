spring:
  application:
    name: digital-registered-letter
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: false
  jpa:
    properties:
      jakarta:
        persistence:
          schema-generation:
            database:
              action: none
  rabbitmq:
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 10000
          multiplier: 2.0
          max-interval: 100000
          max-retries: 3
        default-requeue-rejected: false
  security:
    oauth2:
      client:
        registration:
          party:
            authorization-grant-type: client_credentials
            provider: party
          messaging:
            authorization-grant-type: client_credentials
            provider: messaging
          templating:
            authorization-grant-type: client_credentials
            provider: templating
          postportalservice:
            authorization-grant-type: client_credentials
            provider: postportalservice
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'
logging:
  level:
    root: INFO
integration:
  party:
    connectTimeout: 5
    readTimeout: 30
